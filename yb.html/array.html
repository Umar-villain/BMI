<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Siswa</title>
</head>
<body>

    <p>Masukkan nama siswa</p>

    <input type="text" id="inputNama">
    <button id="tombolTambah">Tambah</button>

    <div id="wadah"></div>

    <script>

        const nama = [];

        const wadah = document.getElementById('wadah');
        const inputNama = document.getElementById('inputNama');
        const tombolTambah = document.getElementById('tombolTambah');

        function tampilkanData() {

            wadah.innerHTML = '';

            nama.forEach((item, index) => {

                const baris = document.createElement('div');
                const text = document.createElement('span');
                const tombolHapus = document.createElement('button');

                text.textContent = item;
                tombolHapus.textContent = 'Hapus';

                tombolHapus.onclick = function () {
                    nama.splice(index, 1);
                    tampilkanData();
                }

                baris.appendChild(text);
                baris.appendChild(tombolHapus);

                wadah.appendChild(baris);
            });
        }

        function tambahData() {

            let namaBaru = inputNama.value.trim();

            if (namaBaru === '') {
                return;
            }

            let hitung = 0;

            nama.forEach(function(item) {

                if (item.startsWith(namaBaru)) {
                    hitung++;
                }

            });

            if (hitung > 0) {
                namaBaru = namaBaru + ' (' + hitung + ')';
            }

            nama.push(namaBaru);

            inputNama.value = '';

            tampilkanData();
        }

        tombolTambah.onclick = tambahData;

        tampilkanData();

    </script>

</body>
</html>
