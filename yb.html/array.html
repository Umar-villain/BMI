<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ian ganteng</title>
</head>
<body>
    <button onclick="ian()">
        Secret
    </button>
    <input type="text" id="input1" placeholder="Masukan Berat Badan">
    <input type="text" id="input2" placeholder="Masukan Tinggi Badan">
    
    <script>
        function ian (){
            let input1 = document.getElementById("input1");
            let input2 = document.getElementById("input2");
            let Hasil_Input_1 = parseInt(input1.value);
            let Hasil_Input_2 = parseInt(input2.value);
            let Tinggi_Badan = Hasil_Input_2 / 100;
            let total_akhir = Hasil_Input_1 / (Tinggi_Badan * Tinggi_Badan)
            total_akhir = total_akhir.toFixed(1)
            console.log(total_akhir)
            
            document.write(total_akhir)
            
            if (total_akhir < 18.5) {
                document.write(" = Kurus");
                let gambar = document.createElement('img');
                gambar.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Skeleton.jpg/250px-Skeleton.jpg'


            } else if (total_akhir > 18.6 && total_akhir < 24.9) {
                document.write(" = Bagus dan Ideal");
            
            } else if (total_akhir > 25 && total_akhir < 30) {
                document.write(" = gemuk");
            
            } else if (total_akhir < 30) {
                document.write(" = obesitas");
            }
        }
    </script>
     <div id ="Hasil"> </div>

</body>
</html>
