<script>
    let nama = ['siswa1', 'siswa2', 'siswa3'];
    let wadah = document.getElementById("wadah");

    function tampil() {
        wadah.innerHTML = "";

        nama.forEach(n => {
            wadah.innerHTML += `<p>${n}</p>`;
        });
    }

    function tambahData() {
        nama.push(document.getElementById("inputNama").value);
        tampil();
    }

    tampil();
</script>
